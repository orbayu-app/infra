services:
  nginx:
    container_name: ${COMPOSE_PROJECT_NAME}-nginx
    build:
      context: ./
      dockerfile: nginx.dockerfile
      target: development
    volumes:
      - ${PROJECT_PATH:-./project}:/application
    ports:
      - "${NGINX_PORT}:80"
    depends_on:
      - php
    networks:
      - external
      - internal
    restart: unless-stopped

  php:
    container_name: ${COMPOSE_PROJECT_NAME}-php
    build:
      context: ./
      dockerfile: php.dockerfile
      target: development
    volumes:
      - ${PROJECT_PATH:-./project}:/application
    networks:
      - internal
    restart: unless-stopped

networks:
  external:
    external: true
    name: ${EXTERNAL_NETWORK:-docker_external}

  internal:
    driver: bridge
